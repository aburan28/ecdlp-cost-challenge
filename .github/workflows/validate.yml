name: validate

# Validate submissions (and harness changes) to the ECDLP Cost Challenge.
#
# Security model:
#   * `pull_request` runs the workflow file from the BASE branch, so a submission
#     PR cannot weaken these checks by editing this file.
#   * fork PRs get a read-only GITHUB_TOKEN and no secrets, so even untrusted
#     solver code cannot exfiltrate or push.
#   * NEVER switch this to `pull_request_target` (that would expose secrets to
#     untrusted code).
#   * The untrusted solver only runs in the `validate` job, which is gated behind
#     the editable-paths guard — so by the time any contestant code executes, we
#     have already proven the PR changed nothing but `src/solver/`.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rustup is preinstalled on the runner; the repo's rust-toolchain file pins
      # the exact channel, so cargo fetches it automatically.
      - name: build (trusted harness + solver)
        run: cargo build --release --locked

  guard:
    name: editable-paths guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: enforce src/solver-only for submissions
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          echo "labels: [${LABELS}]"
          mapfile -t changed < <(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")
          echo "changed files:"; printf '  %s\n' "${changed[@]:-<none>}"
          violations=()
          for f in "${changed[@]:-}"; do
            [ -z "$f" ] && continue
            case "$f" in
              src/solver/*) : ;;     # the only contestant-editable path
              submissions/*) : ;;    # optional: submission notes
              *) violations+=("$f") ;;
            esac
          done
          if [ "${#violations[@]}" -gt 0 ]; then
            if printf ',%s,' "${LABELS}" | grep -q ',harness,'; then
              echo "::warning::PR changes files outside src/solver/, but is labelled 'harness' (maintainer change) — allowed."
              printf '  (allowed) %s\n' "${violations[@]}"
            else
              echo "::error::A submission may only modify src/solver/. The trusted meter/oracle/verifier must stay immutable. Offending files:"
              printf '  %s\n' "${violations[@]}"
              echo "If this is an intentional harness/infra change, a maintainer should add the 'harness' label."
              exit 1
            fi
          else
            echo "OK: only src/solver/ (and/or submissions/) changed."
          fi

  validate:
    name: correctness (sandboxed harness)
    runs-on: ubuntu-latest
    needs: [build, guard]
    steps:
      - uses: actions/checkout@v4
      - name: install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - name: allow unprivileged user namespaces (best effort)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
      - name: setup
        run: ./setup.sh
      - name: run benchmark (small tier — correctness gate)
        env:
          ECDLP_BITS: "28"
          ECDLP_TRIALS: "3"
        run: timeout 600 ./benchmark.sh --note "ci ${{ github.sha }}"
      - name: assert the harness re-derived a valid score
        run: |
          set -euo pipefail
          test -f score.json || { echo "no score.json produced"; exit 1; }
          python3 - <<'PY'
          import json, sys
          d = json.load(open("score.json"))
          m = d.get("metrics", {})
          ok = (m.get("correct") is True) and (d.get("score") is not None)
          print("score:", d.get("score"), "| correct:", m.get("correct"),
                "| ratio_to_rho:", m.get("ratio_to_rho"))
          if not ok:
              print("FAIL: solver did not recover a valid k (k*P != Q).")
              sys.exit(1)
          print("PASS: solver recovered a valid discrete log.")
          PY
      - name: publish score to job summary
        if: always()
        run: |
          {
            echo "### ECDLP benchmark — CI smoke (bits=28, 3 trials)"
            echo '```json'
            cat score.json 2>/dev/null || echo "(no score.json)"
            echo '```'
            echo "_Score is a small-tier correctness gate, not the official ranking._"
          } >> "$GITHUB_STEP_SUMMARY"
