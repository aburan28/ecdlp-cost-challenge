name: Deploy site to GitHub Pages

# Publishes site/ to GitHub Pages. Requires Settings → Pages → Source =
# "GitHub Actions" (set once). The CNAME in site/ pins the custom domain.
#
# The site updates automatically when a challenge is solved: the deploy runs
# `site/build.py`, which renders the First-Blood board from its single source of
# truth (first_blood/status.json). So a push that flips an instance to "solved"
# redeploys with the board already up to date — see the `paths` trigger below.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'first_blood/**'
      - 'submissions/**'
      - 'results.tsv'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      # Render the dynamic regions (First-Blood board) from their source of
      # truth so the deployed artifact is always current, even if a contributor
      # forgot to run build.py locally.
      - name: Render site from data
        run: python3 site/build.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
